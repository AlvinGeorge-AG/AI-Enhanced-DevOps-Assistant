groups:
  - name: production_alerts
    rules:
      # 1. SATURATION: CLUSTER AVERAGE CPU SPIKE
      # Shortened windows for local chaos testing (restore [1m]/2m for prod).
      - alert: HighCPUUsage
        expr: avg(rate(process_cpu_seconds_total[15s])) * 100 > 75
        for: 15s
        labels:
          severity: warning
        annotations:
          summary: "Average Cluster CPU has been above 75% for 15 seconds."

      # 2. SATURATION: TOTAL CLUSTER MEMORY LEAK
      - alert: HighMemoryUsage
        expr: sum(process_resident_memory_bytes) / 1024 / 1024 > 150
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Total Cluster Memory exceeded 150MB."

      # 3. ERRORS: HIGH HTTP 500 RATE
      - alert: HighErrorRate
        expr: sum(rate(flask_http_request_duration_seconds_count{status=~"5.."}[1m])) / sum(rate(flask_http_request_duration_seconds_count[1m])) * 100 > 5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "More than 5% of requests are failing with 5xx Server Errors."
