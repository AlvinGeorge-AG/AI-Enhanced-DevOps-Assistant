# Tells Prometheus what to scrape
global:
  scrape_interval: 5s

rule_files:
  - 'alert_rules.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'target_app'
    # Use Docker's internal DNS to discover ALL dynamically scaled containers
    dns_sd_configs:
      - names:
          - 'app'
        type: 'A'
        port: 5000